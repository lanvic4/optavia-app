<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optavia Precision Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .optavia-green { background-color: #2D5A27; }
        .card { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-shadow { shadow-sm active:shadow-inner transform active:scale-95 transition-all; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans pb-24">

    <nav class="optavia-green p-4 text-white text-center sticky top-0 z-50 shadow-md">
        <h1 class="text-xl font-bold tracking-tight">5&1 Precision Log</h1>
    </nav>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div class="card bg-gray-900 text-white p-5 shadow-xl">
            <div class="grid grid-cols-3 gap-2 text-center">
                <div><p class="text-green-400 text-[9px] font-bold uppercase">Greens</p><p id="greenCount" class="text-2xl font-black">0/3</p></div>
                <div class="border-x border-gray-700"><p class="text-yellow-400 text-[9px] font-bold uppercase">Fats</p><p id="fatCount" class="text-2xl font-black">0</p></div>
                <div><p class="text-blue-400 text-[9px] font-bold uppercase">Cond.</p><p id="condCount" class="text-2xl font-black">0/3</p></div>
            </div>
        </div>

        <div class="card bg-white p-6 shadow-sm border-t-4 border-green-700">
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">1. Preparation State</label>
                    <select id="foodState" class="w-full border p-3 rounded-lg bg-gray-50 text-sm">
                        <option value="raw">Raw / Fresh</option>
                        <option value="frozen">Cooked (from Frozen)</option>
                        <option value="cooked_fresh">Cooked (from Fresh)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">2. Item Name</label>
                    <div class="flex gap-2">
                        <input type="text" id="searchInput" placeholder="Search (e.g. Chicken, Cilantro)..." class="flex-1 border p-3 rounded-lg text-sm bg-gray-50 focus:ring-2 focus:ring-green-500">
                        <button onclick="executeSearch()" class="bg-gray-800 text-white px-5 rounded-lg font-bold text-sm btn-shadow">SEARCH</button>
                    </div>
                </div>
            </div>

            <div id="searchResult" class="hidden mt-6 animate-in slide-in-from-top duration-300">
                <div class="bg-green-50 p-5 rounded-xl border border-green-200">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p id="resultName" class="font-black text-xl text-gray-800 uppercase"></p>
                            <span id="resultCategory" class="text-[10px] font-bold px-2 py-1 rounded bg-white border inline-block mt-1"></span>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div class="bg-white p-3 rounded-lg border shadow-sm text-center">
                            <p class="text-[9px] text-gray-400 font-bold uppercase">Portion Volume</p>
                            <p id="resVol" class="text-sm font-bold text-gray-800"></p>
                        </div>
                        <div class="bg-white p-3 rounded-lg border shadow-sm text-center">
                            <p class="text-[9px] text-gray-400 font-bold uppercase">Portion Weight</p>
                            <p id="resWeight" class="text-sm font-bold text-gray-800"></p>
                        </div>
                    </div>

                    <button onclick="logSearchResult()" class="w-full bg-green-700 text-white p-3 rounded-lg font-bold text-sm shadow-lg hover:bg-green-800">ADD TO DAILY LOG</button>
                </div>
            </div>
        </div>

        <button onclick="resetApp()" class="w-full text-red-400 text-[10px] font-bold tracking-widest uppercase opacity-50 hover:opacity-100">Reset All Data</button>
    </div>

    <script>
        // EXPANDED PRECISION DATABASE
        const db = {
            // PROTEINS
            "chicken breast": { type: "Protein", raw: {v: "6 oz", w: "170g"}, cooked_fresh: {v: "6 oz", w: "170g"}, note: "Leaner Protein category." },
            "cod": { type: "Protein", raw: {v: "7 oz", w: "198g"}, note: "Leanest Protein category." },
            "shrimp": { type: "Protein", raw: {v: "7 oz", w: "198g"}, note: "Leanest Protein category." },
            "ground beef 85%": { type: "Protein", raw: {v: "5 oz", w: "142g"}, note: "Moderate Lean category." },
            
            // GREENS
            "bell pepper": { type: "Green", raw: {v: "1/2 cup", w: "2.63 oz (75g)"}, frozen: {v: "1/2 cup", w: "2.40 oz (68g)"} },
            "broccoli": { type: "Green", raw: {v: "1 cup", w: "2.50 oz (71g)"}, frozen: {v: "1/2 cup", w: "3.25 oz (92g)"} },
            "spinach": { type: "Green", raw: {v: "2 cups", w: "2.12 oz (60g)"}, frozen: {v: "1/2 cup", w: "3.35 oz (95g)"} },
            
            // FATS
            "olive oil": { type: "Fat", any: {v: "1 teaspoon", w: "4.5g"} },
            "avocado": { type: "Fat", any: {v: "1/4 small", w: "1.5 oz (42g)"} },
            
            // CONDIMENTS
            "cilantro": { type: "Condiment", any: {v: "1 Tablespoon", w: "N/A"} },
            "mustard": { type: "Condiment", any: {v: "1 Tablespoon", w: "N/A"} },
            "soy sauce": { type: "Condiment", any: {v: "1/2 Tablespoon", w: "N/A"} }
        };

        let totals = { Green: 0, Fat: 0, Condiment: 0, Protein: 0 };
        let currentItem = null;

        function executeSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const state = document.getElementById('foodState').value;
            const resBox = document.getElementById('searchResult');
            
            // Look for an exact match or a partial match
            const matchKey = Object.keys(db).find(key => key.includes(query) || query.includes(key));
            
            if (matchKey && query !== "") {
                currentItem = db[matchKey];
                const data = currentItem[state] || currentItem.any || currentItem.raw;
                
                document.getElementById('resultName').innerText = matchKey;
                document.getElementById('resVol').innerText = data.v;
                document.getElementById('resWeight').innerText = data.w;
                
                const catEl = document.getElementById('resultCategory');
                catEl.innerText = currentItem.type;
                catEl.className = "text-[10px] font-bold px-2 py-1 rounded bg-white border inline-block mt-1 " + 
                    (currentItem.type === 'Green' ? 'text-green-700' : 
                    currentItem.type === 'Fat' ? 'text-yellow-700' : 'text-blue-700');
                
                resBox.classList.remove('hidden');
            } else {
                alert("Item not found. Please try a different name.");
                resBox.classList.add('hidden');
            }
        }

        function logSearchResult() {
            if (!currentItem || currentItem.type === "Protein") {
                if(currentItem.type === "Protein") alert("Protein logged! Remember: 5, 6, or 7 oz depending on lean category.");
                document.getElementById('searchResult').classList.add('hidden');
                return;
            };
            totals[currentItem.type]++;
            updateUI();
            document.getElementById('searchResult').classList.add('hidden');
            document.getElementById('searchInput').value = "";
        }

        function updateUI() {
            document.getElementById('greenCount').innerText = `${totals.Green}/3`;
            document.getElementById('fatCount').innerText = totals.Fat;
            document.getElementById('condCount').innerText = `${totals.Condiment}/3`;
        }

        function resetApp() { if(confirm("Clear all?")) { totals={Green:0, Fat:0, Condiment:0}; updateUI(); } }
    </script>
</body>
</html>
