<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optavia 5&1 Meal Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .optavia-green { background-color: #2D5A27; }
        .card { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <nav class="optavia-green p-4 text-white text-center shadow-lg">
        <h1 class="text-xl font-bold">5&1 Lean & Green Builder</h1>
        <p class="text-xs opacity-80">Official Guidelines Logic Applied</p>
    </nav>

    <div class="max-w-md mx-auto p-4">
        
        <div class="card bg-white p-6 mb-4">
            <h2 class="font-bold text-gray-700 mb-3">1. Select Your Protein</h2>
            <select id="leanType" onchange="updateRequirements()" class="w-full border p-3 rounded-lg bg-gray-50">
                <option value="">-- Choose Protein Type --</option>
                <option value="leanest">Leanest (7 oz) - e.g. Cod, Shrimp, Egg Whites</option>
                <option value="lean">Lean (6 oz) - e.g. Salmon, Chicken Breast, Swordfish</option>
                <option value="moderate">Mod. Lean (5 oz) - e.g. Ground Beef 85%, Lamb</option>
            </select>
        </div>

        <div id="requirements" class="card bg-white p-6 mb-4 hidden">
            <h2 class="font-bold text-gray-700 mb-3">Your Meal Requirements:</h2>
            <ul class="space-y-2">
                <li id="leanReq" class="flex items-center text-sm">✅ 1 Lean Serving</li>
                <li id="greenReq" class="flex items-center text-sm text-red-500">⭕ 3 Green Servings Needed</li>
                <li id="fatReq" class="flex items-center text-sm">⭕ Healthy Fats Needed</li>
            </ul>
        </div>

        <div class="card bg-white p-6 mb-4">
            <h2 class="font-bold text-gray-700 mb-3 text-center">Add to Meal</h2>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="addGreen()" class="bg-green-100 text-green-800 p-4 rounded-lg font-semibold hover:bg-green-200 border border-green-300">+ 1 Green</button>
                <button onclick="addCondiment()" class="bg-blue-100 text-blue-800 p-4 rounded-lg font-semibold hover:bg-blue-200 border border-blue-300">+ 1 Condiment</button>
            </div>
            
            <input type="text" id="barcodeInput" placeholder="Enter Barcode UPC" class="w-full border p-3 rounded-lg mb-2">
            <button onclick="scanBarcode()" class="w-full bg-gray-800 text-white p-3 rounded-lg font-bold flex items-center justify-center gap-2">
                📷 Search Barcode
            </button>
            <p id="scanResult" class="text-xs text-center mt-2 text-gray-600"></p>
        </div>

        <div class="card bg-green-50 p-6 border-2 border-green-200">
            <h3 class="text-center font-bold text-green-900">Current Meal Status</h3>
            <div class="flex justify-around mt-4 text-center">
                <div><p class="text-xs text-gray-500 uppercase">Greens</p><p id="greenCount" class="text-2xl font-bold">0</p></div>
                <div><p class="text-xs text-gray-500 uppercase">Fats</p><p id="fatCount" class="text-2xl font-bold">0</p></div>
                <div><p class="text-xs text-gray-500 uppercase">Condiments</p><p id="condCount" class="text-2xl font-bold">0</p></div>
            </div>
        </div>

    </div>

    <script>
        let greens = 0;
        let fats = 0;
        let condiments = 0;
        let neededFats = 0;

        function updateRequirements() {
            const type = document.getElementById('leanType').value;
            const reqBox = document.getElementById('requirements');
            const fatReq = document.getElementById('fatReq');
            
            if(type === "") { reqBox.classList.add('hidden'); return; }
            reqBox.classList.remove('hidden');

            if(type === 'leanest') { neededFats = 2; }
            else if(type === 'lean') { neededFats = 1; }
            else { neededFats = 0; }

            fatReq.innerText = neededFats > 0 ? `⭕ Add ${neededFats} Healthy Fat(s)` : "✅ No Healthy Fats Required";
            fatReq.className = neededFats > 0 ? "text-red-500 text-sm" : "text-green-600 text-sm";
        }

        function addGreen() {
            if(greens < 3) {
                greens++;
                document.getElementById('greenCount').innerText = greens;
                if(greens === 3) document.getElementById('greenReq').className = "text-green-600 text-sm font-bold";
            }
        }

        function addCondiment() {
            condiments++;
            document.getElementById('condCount').innerText = condiments;
            if(condiments > 3) alert("Warning: You are over your 3 daily condiments!");
        }

        // New API Logic
        async function scanBarcode() {
            const barcode = document.getElementById('barcodeInput').value;
            const resultDisplay = document.getElementById('scanResult');
            resultDisplay.innerText = "Searching...";

            try {
                const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
                const data = await response.json();

                if (data.status === 1) {
                    const product = data.product;
                    const carbs = product.nutriments['carbohydrates_serving'] || 0;
                    const fat = product.nutriments['fat_serving'] || 0;
                    
                    let classification = "";
                    if (carbs < 1 && fat < 0.5) {
                        classification = "✅ Likely a Condiment (Check portion)";
                        addCondiment();
                    } else if (fat > 4 && fat < 6 && carbs < 2) {
                        classification = "✅ Likely a Healthy Fat serving";
                        fats++;
                        document.getElementById('fatCount').innerText = fats;
                    } else {
                        classification = "⚠️ High Carbs/Fat - Likely not approved";
                    }

                    resultDisplay.innerHTML = `<strong>${product.product_name}</strong><br>${classification}`;
                } else {
                    resultDisplay.innerText = "Product not found.";
                }
            } catch (error) {
                resultDisplay.innerText = "Error scanning.";
            }
        }
    </script>
</body>
</html>
