<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optavia 5&1 Precision Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .optavia-green { background-color: #2D5A27; }
        .card { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .search-btn { background-color: #2563eb !important; transition: all 0.2s; }
        .search-btn:active { transform: scale(0.95); }
        .leanest-tag { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .leaner-tag { background-color: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
        .lean-tag { background-color: #ffedd5; color: #9a3412; border: 1px solid #fed7aa; }
        .condiment-tag { background-color: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
        .fat-tag { background-color: #fefce8; color: #854d0e; border: 1px solid #fef08a; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans pb-24">

    <nav class="optavia-green p-4 text-white text-center sticky top-0 z-50 shadow-md">
        <h1 class="text-xl font-bold tracking-tight">5&1 Precision Log</h1>
    </nav>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div class="card bg-gray-900 text-white p-5 shadow-xl">
            <div class="grid grid-cols-3 gap-2 text-center">
                <div><p class="text-green-400 text-[9px] font-bold uppercase">Greens</p><p id="greenCount" class="text-2xl font-black">0/3</p></div>
                <div class="border-x border-gray-700"><p class="text-yellow-400 text-[9px] font-bold uppercase">Fats</p><p id="fatCount" class="text-2xl font-black">0</p></div>
                <div><p class="text-blue-400 text-[9px] font-bold uppercase">Cond.</p><p id="condCount" class="text-2xl font-black">0/3</p></div>
            </div>
        </div>

        <div class="card bg-white p-6 shadow-sm border-t-4 border-blue-600">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Food Name</label>
                    <input type="text" id="searchInput" placeholder="Try 'Milk', 'Chicken', or 'Broccoli'" class="w-full border-2 border-gray-200 p-4 rounded-lg text-lg bg-white outline-none mb-3">
                    <button onclick="executeSearch()" class="w-full search-btn text-white py-4 rounded-xl font-black text-lg shadow-lg uppercase tracking-widest">
                        🔍 Find Item
                    </button>
                </div>

                <div id="prepArea" class="hidden animate-in fade-in">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Preparation Method</label>
                    <select id="foodState" class="w-full border-2 border-gray-200 p-3 rounded-lg bg-gray-50 text-sm font-bold outline-none focus:border-blue-500">
                    </select>
                </div>
            </div>

            <div id="choiceContainer" class="hidden mt-4 p-4 bg-blue-50 rounded-lg border-2 border-blue-200">
                <p id="choiceTitle" class="text-xs font-bold text-blue-800 uppercase mb-2 text-center"></p>
                <div id="choiceButtons" class="flex flex-col gap-2"></div>
            </div>

            <div id="searchResult" class="hidden mt-6 animate-in slide-in-from-top duration-300">
                <div id="resultContainer" class="p-5 rounded-xl border-2">
                    <div class="mb-4 text-center">
                        <p id="resultName" class="font-black text-2xl text-gray-800 uppercase"></p>
                        <div id="typeTag" class="mt-2 text-[10px] font-bold px-3 py-1 rounded-full inline-block"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div class="bg-white p-3 rounded-lg border shadow-sm text-center">
                            <p class="text-[10px] text-gray-400 font-bold uppercase">Serving Size</p>
                            <p id="resWeight" class="text-md font-bold text-gray-800"></p>
                        </div>
                        <div id="fatBox" class="bg-white p-3 rounded-lg border shadow-sm text-center">
                            <p class="text-[10px] text-gray-400 font-bold uppercase">Healthy Fats</p>
                            <p id="resFats" class="text-md font-bold text-blue-700"></p>
                        </div>
                    </div>
                    <button onclick="logSearchResult()" class="w-full bg-green-600 text-white p-4 rounded-xl font-black text-lg shadow-md uppercase">✅ Add to Today</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const db = {
            // MILK OPTIONS
            "milk (cow's - skim/1%)": { type: "Condiment", states: ["liquid"], liquid: "1 Tbsp", note: "Used as flavor enhancer." },
            "milk (almond - unsweetened)": { type: "Fat", states: ["liquid"], liquid: "2 cups", note: "Counts as 1 Healthy Fat." },
            "milk (soy - unsweetened)": { type: "Condiment", states: ["liquid"], liquid: "1 Tbsp" },
            
            // PROTEINS
            "chicken (white meat)": { type: "Protein", sub: "Leaner", fat: "1 Serving", states: ["raw", "cooked"], raw: "8 oz", cooked: "6 oz" },
            "chicken (dark meat)": { type: "Protein", sub: "Lean", fat: "0 Servings", states: ["raw", "cooked"], raw: "7 oz", cooked: "5 oz" },

            // VEGETABLES
            "broccoli": { type: "Green", states: ["raw", "cooked", "frozen"], raw: "2.50 oz (1 cup)", cooked: "2.75 oz (1/2 cup)", frozen: "3.25 oz (1/2 cup)" },
            "cauliflower": { type: "Green", states: ["raw", "cooked", "frozen"], raw: "3.50 oz (1 cup)", cooked: "3.17 oz (1/2 cup)", frozen: "1.76 oz (1/2 cup)" },
            
            // CONDIMENTS
            "cilantro": { type: "Condiment", states: ["fresh", "dried"], fresh: "1 Tbsp", dried: "1 tsp" }
        };

        const stateLabels = { raw: "Raw Weight", cooked: "Cooked Weight", frozen: "From Frozen", liquid: "Liquid Portion", fresh: "Fresh", dried: "Dried" };
        let totals = { Green: 0, Fat: 0, Condiment: 0 };
        let currentItem = null;

        function executeSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const choiceBox = document.getElementById('choiceContainer');
            const choiceBtnArea = document.getElementById('choiceButtons');
            
            choiceBox.classList.add('hidden');
            document.getElementById('searchResult').classList.add('hidden');
            document.getElementById('prepArea').classList.add('hidden');

            if (!query) return;

            // Handle Selection Menus (Milk & Chicken)
            if (query === "milk" || query === "chicken") {
                const title = query === "milk" ? "Select Milk Type:" : "Select Chicken Type:";
                const options = query === "milk" ? ["milk (cow's - skim/1%)", "milk (almond - unsweetened)"] : ["chicken (white meat)", "chicken (dark meat)"];
                
                document.getElementById('choiceTitle').innerText = title;
                choiceBox.classList.remove('hidden');
                choiceBtnArea.innerHTML = "";
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "w-full bg-blue-600 text-white p-3 rounded-lg font-bold text-sm shadow-md";
                    btn.innerText = opt.toUpperCase();
                    btn.onclick = () => setupPrep(opt);
                    choiceBtnArea.appendChild(btn);
                });
                return;
            }

            const matchKey = Object.keys(db).find(key => key.includes(query));
            if (matchKey) setupPrep(matchKey);
            else alert("Item not found. Try 'Milk', 'Chicken', or 'Broccoli'.");
        }

        function setupPrep(key) {
            currentItem = db[key];
            const stateSelect = document.getElementById('foodState');
            stateSelect.innerHTML = "";
            currentItem.states.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.innerText = stateLabels[s];
                stateSelect.appendChild(opt);
            });
            document.getElementById('prepArea').classList.remove('hidden');
            document.getElementById('choiceContainer').classList.add('hidden');
            stateSelect.onchange = () => showFinalResult(key);
            showFinalResult(key);
        }

        function showFinalResult(key) {
            const state = document.getElementById('foodState').value;
            const resBox = document.getElementById('searchResult');
            const weightValue = currentItem[state];
            
            document.getElementById('resultName').innerText = key;
            document.getElementById('resWeight').innerText = weightValue;
            document.getElementById('resFats').innerText = currentItem.fat || "N/A";
            
            const tTag = document.getElementById('typeTag');
            if (currentItem.type === "Protein") {
                tTag.innerText = currentItem.sub + " Protein";
                tTag.className = "mt-2 text-[10px] font-bold px-3 py-1 rounded-full inline-block " + (currentItem.sub === 'Leanest' ? 'leanest-tag' : currentItem.sub === 'Leaner' ? 'leaner-tag' : 'lean-tag');
            } else if (currentItem.type === "Condiment") {
                tTag.innerText = "CONDIMENT";
                tTag.className = "mt-2 text-[10px] font-bold px-3 py-1 rounded-full inline-block condiment-tag";
            } else {
                tTag.innerText = "HEALTHY FAT";
                tTag.className = "mt-2 text-[10px] font-bold px-3 py-1 rounded-full inline-block fat-tag";
            }
            resBox.classList.remove('hidden');
        }

        function logSearchResult() {
            if (currentItem.type !== "Protein") {
                totals[currentItem.type]++;
                updateUI();
            } else {
                alert("Protein logged. Follow your Fat Guide!");
            }
            document.getElementById('searchResult').classList.add('hidden');
            document.getElementById('prepArea').classList.add('hidden');
            document.getElementById('searchInput').value = "";
        }

        function updateUI() {
            document.getElementById('greenCount').innerText = `${totals.Green}/3`;
            document.getElementById('fatCount').innerText = totals.Fat;
            document.getElementById('condCount').innerText = `${totals.Condiment}/3`;
        }
    </script>
</body>
</html>
