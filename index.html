<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optavia Precision Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .optavia-green { background-color: #2D5A27; }
        .card { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .search-btn { background-color: #2563eb !important; transition: all 0.2s; }
        .search-btn:active { transform: scale(0.95); }
        .leanest-tag { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .leaner-tag { background-color: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
        .lean-tag { background-color: #ffedd5; color: #9a3412; border: 1px solid #fed7aa; }
        .fat-tag { background-color: #fefce8; color: #854d0e; border: 1px solid #fef08a; }
        .condiment-tag { background-color: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans pb-24">

    <nav class="optavia-green p-4 text-white text-center sticky top-0 z-50 shadow-md">
        <h1 class="text-xl font-bold tracking-tight">5&1 Precision Log</h1>
    </nav>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div class="card bg-gray-900 text-white p-5 shadow-xl">
            <div class="grid grid-cols-3 gap-2 text-center">
                <div><p class="text-green-400 text-[9px] font-bold uppercase">Greens</p><p id="greenCount" class="text-2xl font-black">0/3</p></div>
                <div class="border-x border-gray-700"><p class="text-yellow-400 text-[9px] font-bold uppercase">Fats</p><p id="fatCount" class="text-2xl font-black">0</p></div>
                <div><p class="text-blue-400 text-[9px] font-bold uppercase">Cond.</p><p id="condCount" class="text-2xl font-black">0/3</p></div>
            </div>
        </div>

        <div class="card bg-white p-6 shadow-sm border-t-4 border-blue-600">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Search Food Database</label>
                    <input type="text" id="searchInput" placeholder="Search (e.g. Chicken, Shrimp, Avocado)" class="w-full border-2 border-gray-200 p-4 rounded-lg text-lg bg-white outline-none mb-3">
                    <button onclick="executeSearch()" class="w-full search-btn text-white py-4 rounded-xl font-black text-lg shadow-lg uppercase tracking-widest">
                        🔍 Search
                    </button>
                </div>
            </div>

            <div id="choiceContainer" class="hidden mt-4 p-4 bg-gray-50 rounded-lg border-2 border-dashed border-gray-300">
                <p id="choiceTitle" class="text-xs font-bold text-gray-600 uppercase mb-3 text-center">Tap to select:</p>
                <div id="choiceButtons" class="flex flex-col gap-2"></div>
            </div>

            <div id="searchResult" class="hidden mt-6 animate-in slide-in-from-top duration-300">
                <div id="resultContainer" class="p-5 rounded-xl border-2">
                    <div class="mb-4 text-center">
                        <p id="resultName" class="font-black text-xl text-gray-800 uppercase leading-tight"></p>
                        <div id="typeTag" class="mt-2 text-[10px] font-bold px-3 py-1 rounded-full inline-block"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div class="bg-white p-3 rounded-lg border shadow-sm text-center">
                            <p class="text-[10px] text-gray-400 font-bold uppercase">Portion Size</p>
                            <p id="resWeight" class="text-md font-bold text-gray-800"></p>
                        </div>
                        <div class="bg-white p-3 rounded-lg border shadow-sm text-center">
                            <p class="text-[10px] text-gray-400 font-bold uppercase">Healthy Fats</p>
                            <p id="resFats" class="text-md font-bold text-blue-700"></p>
                        </div>
                    </div>
                    <button onclick="logSearchResult()" class="w-full bg-green-600 text-white p-4 rounded-xl font-black text-lg shadow-md uppercase">✅ Add to Log</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const db = [
            // LEANEST PROTEINS (7 oz Cooked + 2 Fats)
            { name: "Cod, Flounder, Tilapia (Cooked)", type: "Protein", sub: "Leanest", weight: "7 oz", fat: "2 Servings", tags: ["fish", "cod", "flounder", "tilapia"] },
            { name: "Shrimp, Scallops, Crab (Cooked)", type: "Protein", sub: "Leanest", weight: "7 oz", fat: "2 Servings", tags: ["shrimp", "seafood", "scallops", "crab"] },
            { name: "Egg Whites (Liquid)", type: "Protein", sub: "Leanest", weight: "2 Cups", fat: "2 Servings", tags: ["egg", "whites"] },
            { name: "Turkey Breast (Cooked)", type: "Protein", sub: "Leanest", weight: "7 oz", fat: "2 Servings", tags: ["turkey", "breast"] },

            // LEANER PROTEINS (6 oz Cooked + 1 Fat)
            { name: "Chicken Breast (Cooked)", type: "Protein", sub: "Leaner", weight: "6 oz", fat: "1 Serving", tags: ["chicken", "breast"] },
            { name: "Salmon, Swordfish, Tuna (Cooked)", type: "Protein", sub: "Leaner", weight: "6 oz", fat: "1 Serving", tags: ["salmon", "tuna", "swordfish"] },
            { name: "Ground Turkey (95%-98% Lean)", type: "Protein", sub: "Leaner", weight: "6 oz", fat: "1 Serving", tags: ["turkey", "ground"] },

            // LEAN PROTEINS (5 oz Cooked + 0 Fats)
            { name: "Beef: Sirloin, Steak, Roast (Cooked)", type: "Protein", sub: "Lean", weight: "5 oz", fat: "0 Servings", tags: ["beef", "steak", "sirloin", "roast"] },
            { name: "Chicken Thigh or Drumstick (Cooked)", type: "Protein", sub: "Lean", weight: "5 oz", fat: "0 Servings", tags: ["chicken", "thigh", "dark meat"] },
            { name: "Pork Tenderloin (Cooked)", type: "Protein", sub: "Lean", weight: "5 oz", fat: "0 Servings", tags: ["pork", "tenderloin"] },
            { name: "Whole Eggs", type: "Protein", sub: "Lean", weight: "3 Eggs", fat: "0 Servings", tags: ["egg", "whole"] },

            // GREENS (Vegetables)
            { name: "Asparagus (Cooked)", type: "Green", weight: "1/2 Cup (3.17 oz)", fat: "N/A", tags: ["asparagus"] },
            { name: "Broccoli (Cooked)", type: "Green", weight: "1/2 Cup (2.75 oz)", fat: "N/A", tags: ["broccoli"] },
            { name: "Broccoli (Raw)", type: "Green", weight: "1 Cup (2.50 oz)", fat: "N/A", tags: ["broccoli"] },
            { name: "Cauliflower (Cooked)", type: "Green", weight: "1/2 Cup (3.17 oz)", fat: "N/A", tags: ["cauliflower"] },
            { name: "Spinach (Cooked)", type: "Green", weight: "1/2 Cup (3.17 oz)", fat: "N/A", tags: ["spinach"] },
            { name: "Spinach (Raw)", type: "Green", weight: "1 Cup (1.06 oz)", fat: "N/A", tags: ["spinach"] },
            { name: "Zucchini (Cooked)", type: "Green", weight: "1/2 Cup (3.17 oz)", fat: "N/A", tags: ["zucchini"] },

            // HEALTHY FATS & CONDIMENTS
            { name: "Avocado", type: "Fat", weight: "1.5 oz (approx 1/4 med)", fat: "1", tags: ["avocado"] },
            { name: "Almond Milk - Unsweetened (As 1 Healthy Fat)", type: "Fat", weight: "2 Cups", fat: "1", tags: ["milk", "almond"] },
            { name: "Almond Milk - Unsweetened (As 1 Condiment)", type: "Condiment", weight: "1 Cup", fat: "N/A", tags: ["milk", "almond"] },
            { name: "Oil (Olive, Avocado, Canola)", type: "Fat", weight: "1 tsp", fat: "1", tags: ["oil", "olive", "avocado"] },
            { name: "Salad Dressing (Light/Reduced Fat)", type: "Condiment", weight: "1 Tbsp", fat: "N/A", tags: ["dressing", "salad"] },
            { name: "Mayo (Light)", type: "Condiment", weight: "1 tsp", fat: "N/A", tags: ["mayo", "mayonnaise"] }
        ];

        let totals = { Green: 0, Fat: 0, Condiment: 0 };
        let currentItem = null;

        function executeSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const choiceBox = document.getElementById('choiceContainer');
            const choiceBtnArea = document.getElementById('choiceButtons');
            const resBox = document.getElementById('searchResult');
            
            resBox.classList.add('hidden');
            choiceBox.classList.add('hidden');

            if (!query) return;

            const matches = db.filter(item => item.tags.some(tag => tag.includes(query)));

            if (matches.length > 0) {
                choiceBox.classList.remove('hidden');
                choiceBtnArea.innerHTML = "";
                matches.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = "w-full bg-white border-2 border-blue-500 text-blue-700 p-3 rounded-lg font-bold text-sm shadow-sm uppercase text-left hover:bg-blue-50";
                    btn.innerText = item.name;
                    btn.onclick = () => showFinalResult(item);
                    choiceBtnArea.appendChild(btn);
                });
            } else {
                alert("Food not found. Try keywords like 'Fish', 'Beef', or 'Zucchini'.");
            }
        }

        function showFinalResult(item) {
            currentItem = item;
            document.getElementById('resultName').innerText = item.name;
            document.getElementById('resWeight').innerText = item.weight;
            document.getElementById('resFats').innerText = item.fat;
            
            const tTag = document.getElementById('typeTag');
            const resCont = document.getElementById('resultContainer');

            if (item.type === "Protein") {
                tTag.innerText = item.sub + " Protein";
                tTag.className = "mt-2 text-[10px] font-bold px-3 py-1 rounded-full inline-block " + 
                    (item.sub === 'Leanest' ? 'leanest-tag' : item.sub === 'Leaner' ? 'leaner-tag' : 'lean-tag');
                resCont.className = "p-5 rounded-xl border-2 border-blue-200 bg-blue-50";
            } else if (item.type === "Fat") {
                tTag.innerText = "HEALTHY FAT";
                tTag.className = "mt-2 text-[10px] font-bold px-3 py-1 rounded-full inline-block fat-tag";
                resCont.className = "p-5 rounded-xl border-2 border-yellow-200 bg-white";
            } else if (item.type === "Condiment") {
                tTag.innerText = "CONDIMENT";
                tTag.className = "mt-2 text-[10px] font-bold px-3 py-1 rounded-full inline-block condiment-tag";
                resCont.className = "p-5 rounded-xl border-2 border-blue-100 bg-white";
            } else {
                tTag.innerText = "GREEN";
                tTag.className = "mt-2 text-[10px] font-bold px-3 py-1 rounded-full inline-block bg-green-100 text-green-700";
                resCont.className = "p-5 rounded-xl border-2 border-green-200 bg-white";
            }

            document.getElementById('searchResult').classList.remove('hidden');
            document.getElementById('choiceContainer').classList.add('hidden');
        }

        function logSearchResult() {
            if (currentItem.type === "Protein") {
                alert("Logged! For this " + currentItem.sub + " protein, add " + currentItem.fat + " healthy fats to your meal.");
            } else {
                totals[currentItem.type]++;
                updateUI();
            }
            document.getElementById('searchResult').classList.add('hidden');
            document.getElementById('searchInput').value = "";
        }

        function updateUI() {
            document.getElementById('greenCount').innerText = `${totals.Green}/3`;
            document.getElementById('fatCount').innerText = totals.Fat;
            document.getElementById('condCount').innerText = `${totals.Condiment}/3`;
        }
    </script>
</body>
</html>
