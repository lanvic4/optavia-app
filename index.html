<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optavia 5&1 Daily Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .optavia-green { background-color: #2D5A27; }
        .card { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans pb-10">

    <nav class="optavia-green p-4 text-white text-center shadow-lg">
        <h1 class="text-xl font-bold">5&1 Daily Dashboard</h1>
    </nav>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div class="card bg-white p-6">
            <h2 class="font-bold text-gray-700 mb-3">Daily Fuelings (5 Required)</h2>
            <div class="flex justify-between items-center">
                <span id="fuelingCount" class="text-4xl font-bold text-green-700">0</span>
                <button onclick="logFueling()" class="bg-gray-800 text-white px-4 py-2 rounded-lg font-bold">Log Fueling</button>
            </div>
        </div>

        <div class="card bg-white p-6">
            <h2 class="font-bold text-gray-700 mb-3">Water (64oz Required)</h2>
            <div class="flex justify-between items-center mb-2">
                <span id="waterCount" class="text-3xl font-bold text-blue-700">0 oz</span>
                <button onclick="addWater()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">+8 oz</button>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2.5">
                <div id="waterBar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
            </div>
        </div>

        <div class="card bg-white p-6">
            <h2 class="font-bold text-gray-700 mb-1">Intelligent Item Search</h2>
            <p class="text-xs text-gray-500 mb-3">Search name or scan barcode.</p>
            
            <input type="text" id="searchInput" placeholder="Salmon, Broccoli, Olive Oil..." class="w-full border p-2 rounded-lg mb-2 text-sm">
            
            <div class="grid grid-cols-2 gap-2 mb-3">
                <button onclick="searchFood(false)" class="bg-gray-800 text-white p-2 rounded-lg font-bold text-sm">📷 Scan Barcode</button>
                <button onclick="searchFood(true)" class="bg-gray-200 text-gray-800 p-2 rounded-lg font-bold text-sm">🔍 Search Name</button>
            </div>
            
            <div id="searchResult" class="bg-gray-100 p-3 rounded-lg text-sm hidden">
                <p id="resultName" class="font-bold"></p>
                <p id="resultCategory" class="text-green-700"></p>
                <p id="resultInstructions" class="text-gray-600 mb-2"></p>
                <button onclick="logSearchResult()" class="w-full bg-green-600 text-white p-2 rounded-lg font-bold text-sm">Add to Today</button>
            </div>
        </div>

        <div class="card bg-green-50 p-4 border border-green-200">
            <h3 class="text-center font-bold text-green-900">Today's Totals</h3>
            <div class="flex justify-around mt-2 text-center mb-4">
                <div><p class="text-xs text-gray-500">Greens</p><p id="greenCount" class="text-xl font-bold">0</p></div>
                <div><p class="text-xs text-gray-500">Fats</p><p id="fatCount" class="text-xl font-bold">0</p></div>
                <div><p class="text-xs text-gray-500">Cond</p><p id="condCount" class="text-xl font-bold">0</p></div>
            </div>
            <button onclick="resetApp()" class="w-full bg-red-100 text-red-700 p-2 rounded-lg font-bold text-sm border border-red-300">Reset Day</button>
        </div>

    </div>

    <script>
        let greens = 0; let fats = 0; let condiments = 0; let fuelings = 0; let water = 0;
        let currentItem = null;

        // Auto-Reset on new day
        window.onload = function() { checkAndResetDate(); };
        function checkAndResetDate() {
            const lastDate = localStorage.getItem('lastDate');
            const today = new Date().toDateString();
            if (lastDate !== today) { resetApp(false); localStorage.setItem('lastDate', today); }
        }

        function resetApp(manual = true) {
            if(manual && !confirm("Are you sure?")) return;
            greens = 0; fats = 0; condiments = 0; fuelings = 0; water = 0;
            document.getElementById('fuelingCount').innerText = 0;
            document.getElementById('waterCount').innerText = "0 oz";
            document.getElementById('waterBar').style.width = "0%";
            document.getElementById('greenCount').innerText = 0;
            document.getElementById('fatCount').innerText = 0;
            document.getElementById('condCount').innerText = 0;
            document.getElementById('searchResult').classList.add('hidden');
        }

        function logFueling() {
            if(fuelings < 5) {
                fuelings++;
                document.getElementById('fuelingCount').innerText = fuelings;
            } else { alert("5 Fuelings reached!"); }
        }

        function addWater() {
            water += 8;
            document.getElementById('waterCount').innerText = water + " oz";
            let percent = (water / 64) * 100;
            document.getElementById('waterBar').style.width = Math.min(percent, 100) + "%";
        }

        // Live API Search
        async function searchFood(byName) {
            const query = document.getElementById('searchInput').value;
            const resultDisplay = document.getElementById('searchResult');
            const resName = document.getElementById('resultName');
            const resCat = document.getElementById('resultCategory');
            const resInst = document.getElementById('resultInstructions');
            
            resultDisplay.classList.remove('hidden');
            resName.innerText = "Searching...";
            resCat.innerText = "";
            resInst.innerText = "";

            try {
                let url = byName 
                    ? `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${query}&search_simple=1&action=process&json=1`
                    : `https://world.openfoodfacts.org/api/v0/product/${query}.json`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                const product = byName ? data.products[0] : data.product;

                if (product) {
                    currentItem = analyzeProduct(product);
                    resName.innerText = product.product_name;
                    resCat.innerText = currentItem.type;
                    resInst.innerText = currentItem.message;
                } else {
                    resName.innerText = "Product not found.";
                }
            } catch (error) {
                resName.innerText = "Error fetching data.";
            }
        }

        // Optavia Logic Engine
        function analyzeProduct(product) {
            const nutriments = product.nutriments;
            const protein = nutriments['proteins_serving'] || 0;
            const fat = nutriments['fat_serving'] || 0;
            const carbs = nutriments['carbohydrates_serving'] || 0;
            const fiber = nutriments['fiber_serving'] || 0;
            const netCarbs = carbs - fiber;

            if (protein > 15) {
                let level = "Moderately Lean (5oz)";
                if (fat < 5) level = "Leanest (7oz)";
                else if (fat < 10) level = "Lean (6oz)";
                return { type: "Protein", message: `This is a ${level} protein.` };
            } else if (netCarbs < 5 && fat < 2) {
                return { type: "Green Vegetable", message: "Counts as 1 Green Serving." };
            } else if (fat > 4 && netCarbs < 2) {
                return { type: "Healthy Fat", message: "Counts as 1 Healthy Fat." };
            } else if (netCarbs < 1 && fat < 0.5) {
                return { type: "Condiment", message: "Counts as 1 Condiment." };
            } else {
                return { type: "Off-Plan", message: "High in carbs or fat." };
            }
        }

        function logSearchResult() {
            if (!currentItem) return;
            if (currentItem.type === "Green Vegetable") {
                if(greens < 3) { greens++; document.getElementById('greenCount').innerText = greens; }
                else { alert("3 Greens already logged!"); }
            } else if (currentItem.type === "Healthy Fat") {
                fats++; document.getElementById('fatCount').innerText = fats;
            } else if (currentItem.type === "Condiment") {
                condiments++; document.getElementById('condCount').innerText = condiments;
            } else if (currentItem.type === "Protein") {
                alert("Log protein by weight, not scan!");
            }
            document.getElementById('searchResult').classList.add('hidden');
        }
    </script>
</body>
</html>
