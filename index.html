<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optavia 5&1 Daily Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .optavia-green { background-color: #2D5A27; }
        .card { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans pb-10">

    <nav class="optavia-green p-4 text-white text-center shadow-lg">
        <h1 class="text-xl font-bold">5&1 Daily Dashboard</h1>
    </nav>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div class="card bg-white p-6">
            <h2 class="font-bold text-gray-700 mb-3">Daily Fuelings (5 Required)</h2>
            <div class="flex justify-between items-center">
                <span id="fuelingCount" class="text-4xl font-bold text-green-700">0</span>
                <button onclick="logFueling()" class="bg-gray-800 text-white px-4 py-2 rounded-lg font-bold">Log Fueling</button>
            </div>
        </div>

        <div class="card bg-white p-6">
            <h2 class="font-bold text-gray-700 mb-3">Water (64oz Required)</h2>
            <div class="flex justify-between items-center mb-2">
                <span id="waterCount" class="text-3xl font-bold text-blue-700">0 oz</span>
                <button onclick="addWater()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">+8 oz</button>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2.5">
                <div id="waterBar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
            </div>
        </div>

        <div class="card bg-white p-6">
            <h2 class="font-bold text-gray-700 mb-1">Lean & Green Builder</h2>
            <p class="text-xs text-gray-500 mb-3">1 Lean + 3 Greens + Fats</p>
            
            <select id="leanType" onchange="updateRequirements()" class="w-full border p-2 rounded-lg bg-gray-50 mb-3 text-sm">
                <option value="">-- Select Protein Type --</option>
                <option value="leanest">Leanest (7 oz)</option>
                <option value="lean">Lean (6 oz)</option>
                <option value="moderate">Mod. Lean (5 oz)</option>
            </select>

            <div id="requirements" class="bg-gray-100 p-3 rounded-lg mb-3 hidden text-sm">
                <p id="fatReq" class="text-gray-700">⭕ Add Healthy Fats</p>
                <p id="greenReq" class="text-gray-700">⭕ Add 3 Green Servings</p>
            </div>

            <div class="grid grid-cols-2 gap-2 mb-3">
                <button onclick="addGreen()" class="bg-green-100 text-green-800 p-2 rounded-lg text-sm font-semibold border border-green-300">+1 Green</button>
                <button onclick="addCondiment()" class="bg-blue-100 text-blue-800 p-2 rounded-lg text-sm font-semibold border border-blue-300">+1 Condiment</button>
            </div>
            
            <input type="text" id="barcodeInput" placeholder="UPC Barcode" class="w-full border p-2 rounded-lg mb-2 text-sm">
            <button onclick="scanBarcode()" class="w-full bg-gray-800 text-white p-2 rounded-lg font-bold text-sm">📷 Scan Item</button>
            <p id="scanResult" class="text-xs text-center mt-2 text-gray-600"></p>
        </div>

        <div class="card bg-green-50 p-4 border border-green-200">
            <h3 class="text-center font-bold text-green-900">Meal Totals</h3>
            <div class="flex justify-around mt-2 text-center mb-4">
                <div><p class="text-xs text-gray-500">Greens</p><p id="greenCount" class="text-xl font-bold">0</p></div>
                <div><p class="text-xs text-gray-500">Fats</p><p id="fatCount" class="text-xl font-bold">0</p></div>
                <div><p class="text-xs text-gray-500">Cond</p><p id="condCount" class="text-xl font-bold">0</p></div>
            </div>
            <button onclick="resetApp()" class="w-full bg-red-100 text-red-700 p-2 rounded-lg font-bold text-sm border border-red-300">Reset Day</button>
        </div>

    </div>

    <script>
        let greens = 0; let fats = 0; let condiments = 0; let neededFats = 0;
        let fuelings = 0; let water = 0;
        
        // Load data on startup
        window.onload = function() {
            checkAndResetDate();
        };

        function checkAndResetDate() {
            const lastDate = localStorage.getItem('lastDate');
            const today = new Date().toDateString();

            if (lastDate !== today) {
                resetApp(false);
                localStorage.setItem('lastDate', today);
            }
        }

        function resetApp(manual = true) {
            if(manual && !confirm("Are you sure you want to reset the day?")) return;
            
            greens = 0; fats = 0; condiments = 0; fuelings = 0; water = 0;
            document.getElementById('fuelingCount').innerText = 0;
            document.getElementById('waterCount').innerText = "0 oz";
            document.getElementById('waterBar').style.width = "0%";
            document.getElementById('greenCount').innerText = 0;
            document.getElementById('fatCount').innerText = 0;
            document.getElementById('condCount').innerText = 0;
            document.getElementById('leanType').value = "";
            document.getElementById('requirements').classList.add('hidden');
            document.getElementById('scanResult').innerText = "";
            document.getElementById('barcodeInput').value = "";
        }

        function logFueling() {
            if(fuelings < 5) {
                fuelings++;
                document.getElementById('fuelingCount').innerText = fuelings;
            } else { alert("You've logged all 5 fuelings!"); }
        }

        function addWater() {
            water += 8;
            document.getElementById('waterCount').innerText = water + " oz";
            let percent = (water / 64) * 100;
            document.getElementById('waterBar').style.width = Math.min(percent, 100) + "%";
        }

        function updateRequirements() {
            const type = document.getElementById('leanType').value;
            const reqBox = document.getElementById('requirements');
            const fatReq = document.getElementById('fatReq');
            const greenReq = document.getElementById('greenReq');
            
            if(type === "") { reqBox.classList.add('hidden'); return; }
            reqBox.classList.remove('hidden');

            if(type === 'leanest') { neededFats = 2; }
            else if(type === 'lean') { neededFats = 1; }
            else { neededFats = 0; }

            fatReq.innerText = neededFats > 0 ? `⭕ Add ${neededFats} Healthy Fat(s)` : "✅ No Healthy Fats Required";
            fatReq.className = neededFats > 0 ? "text-red-700 font-bold" : "text-green-700 font-bold";
            
            // Reset Green requirements display
            greenReq.innerText = "⭕ Add 3 Green Servings";
            greenReq.className = "text-gray-700";
        }

        function addGreen() {
            if(greens < 3) {
                greens++;
                document.getElementById('greenCount').innerText = greens;
                if(greens === 3) {
                    const greenReq = document.getElementById('greenReq');
                    greenReq.innerText = "✅ 3 Greens Added";
                    greenReq.className = "text-green-700 font-bold";
                }
            }
        }

        function addCondiment() {
            condiments++;
            document.getElementById('condCount').innerText = condiments;
            if(condiments > 3) alert("Warning: You are over your 3 daily condiments!");
        }

        async function scanBarcode() {
            const barcode = document.getElementById('barcodeInput').value;
            const resultDisplay = document.getElementById('scanResult');
            if(!barcode) { resultDisplay.innerText = "Please enter a barcode."; return; }
            resultDisplay.innerText = "Searching...";

            try {
                const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
                const data = await response.json();

                if (data.status === 1) {
                    const product = data.product;
                    // API data is often per 100g, but we want per serving if available
                    const carbs = product.nutriments['carbohydrates_serving'] || 0;
                    const fat = product.nutriments['fat_serving'] || 0;
                    
                    let classification = "";
                    if (carbs < 1 && fat < 0.5) {
                        classification = "✅ Likely a Condiment (Check portion)";
                        addCondiment();
                    } else if (fat > 4 && fat < 6 && carbs < 2) {
                        classification = "✅ Likely a Healthy Fat serving";
                        fats++;
                        document.getElementById('fatCount').innerText = fats;
                    } else {
                        classification = "⚠️ High Carbs/Fat - Likely not approved";
                    }

                    resultDisplay.innerHTML = `<strong>${product.product_name}</strong><br>${classification}`;
                } else {
                    resultDisplay.innerText = "Product not found.";
                }
            } catch (error) {
                resultDisplay.innerText = "Error scanning.";
            }
        }
    </script>
</body>
</html>
