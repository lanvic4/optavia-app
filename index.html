<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optavia 5&1 Daily Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .optavia-green { background-color: #2D5A27; }
        .card { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans pb-10">

    <nav class="optavia-green p-4 text-white text-center shadow-lg">
        <h1 class="text-xl font-bold">5&1 Daily Tracker</h1>
    </nav>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div class="card bg-white p-6">
            <h2 class="font-bold text-gray-700 mb-3">Daily Fuelings (5 Required)</h2>
            <div class="flex justify-between items-center">
                <span id="fuelingCount" class="text-4xl font-bold text-green-700">0</span>
                <button onclick="logFueling()" class="bg-gray-800 text-white px-4 py-2 rounded-lg font-bold">Log Fueling</button>
            </div>
        </div>

        <div class="card bg-white p-6">
            <h2 class="font-bold text-gray-700 mb-3">Water (64 oz Required)</h2>
            <div class="flex justify-between items-center mb-2">
                <span id="waterCount" class="text-3xl font-bold text-blue-700">0 oz</span>
                <button onclick="addWater()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">+8 oz</button>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2.5">
                <div id="waterBar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
            </div>
        </div>

        <div class="card bg-white p-6">
            <h2 class="font-bold text-gray-700 mb-1">Search Food</h2>
            <p class="text-xs text-gray-500 mb-3">Type name to get exact Optavia serving size.</p>
            
            <input type="text" id="searchInput" placeholder="Search (e.g. Salmon)..." class="w-full border p-2 rounded-lg mb-2 text-sm">
            
            <button onclick="searchFoodDatabase()" class="w-full bg-gray-800 text-white p-2 rounded-lg font-bold text-sm">🔍 Search Database</button>
            
            <div id="searchResult" class="bg-gray-100 p-3 rounded-lg text-sm hidden mt-3">
                <p id="resultName" class="font-bold"></p>
                <p id="resultCategory" class="text-green-700"></p>
                <p id="resultInstructions" class="text-gray-600 mb-2"></p>
                <button onclick="logSearchResult()" class="w-full bg-green-600 text-white p-2 rounded-lg font-bold text-sm">Add to Today</button>
            </div>
        </div>

        <div class="card bg-green-50 p-4 border border-green-200">
            <h3 class="text-center font-bold text-green-900">Today's Totals</h3>
            <div class="flex justify-around mt-2 text-center mb-4">
                <div><p class="text-xs text-gray-500">Greens</p><p id="greenCount" class="text-xl font-bold">0</p></div>
                <div><p class="text-xs text-gray-500">Fats</p><p id="fatCount" class="text-xl font-bold">0</p></div>
                <div><p class="text-xs text-gray-500">Cond</p><p id="condCount" class="text-xl font-bold">0</p></div>
            </div>
            <button onclick="resetApp()" class="w-full bg-red-100 text-red-700 p-2 rounded-lg font-bold text-sm border border-red-300">Reset Day</button>
        </div>

    </div>

    <script>
        let greens = 0; let fats = 0; let condiments = 0; let fuelings = 0; let water = 0;
        let currentItem = null;

        // Expanded Hardcoded Optavia Database
        const optaviaDB = {
            // --- PROTEINS (Leanest 7oz, Lean 6oz, Moderate 5oz) ---
            "cod": { type: "Protein", serving: "7 oz (raw weight)" },
            "shrimp": { type: "Protein", serving: "7 oz (raw weight)" },
            "egg whites": { type: "Protein", serving: "1.5 cups" },
            "chicken breast": { type: "Protein", serving: "6 oz (raw weight)" },
            "salmon": { type: "Protein", serving: "6 oz (raw weight)" },
            "swordfish": { type: "Protein", serving: "6 oz (raw weight)" },
            "ground turkey 93%": { type: "Protein", serving: "6 oz (raw weight)" },
            "ground beef 85%": { type: "Protein", serving: "5 oz (raw weight)" },
            "lamb": { type: "Protein", serving: "5 oz (raw weight)" },
            "pork chop": { type: "Protein", serving: "5 oz (raw weight)" },

            // --- GREENS (3 Servings needed for a meal) ---
            "spinach": { type: "Green Vegetable", serving: "2 cups (raw)" },
            "lettuce": { type: "Green Vegetable", serving: "2 cups (raw)" },
            "broccoli": { type: "Green Vegetable", serving: "1 cup (raw)" },
            "zucchini": { type: "Green Vegetable", serving: "1 cup (raw)" },
            "cauliflower": { type: "Green Vegetable", serving: "1 cup (raw)" },
            "asparagus": { type: "Green Vegetable", serving: "1 cup (raw)" },
            "green beans": { type: "Green Vegetable", serving: "1 cup (raw)" },
            "bell peppers": { type: "Green Vegetable", serving: "1/2 cup (raw)" },
            "tomatoes": { type: "Green Vegetable", serving: "1/2 cup (raw)" },

            // --- HEALTHY FATS ---
            "olive oil": { type: "Healthy Fat", serving: "1 teaspoon" },
            "butter": { type: "Healthy Fat", serving: "1 teaspoon" },
            "avocado": { type: "Healthy Fat", serving: "1.5 ounces" },
            "almonds": { type: "Healthy Fat", serving: "10 whole" },
            "walnuts": { type: "Healthy Fat", serving: "7 halves" },
            "olives": { type: "Healthy Fat", serving: "5 large" },

            // --- CONDIMENTS ---
            "mustard": { type: "Condiment", serving: "2 tablespoons" },
            "soy sauce": { type: "Condiment", serving: "1 tablespoon" },
            "hot sauce": { type: "Condiment", serving: "1 tablespoon" },
            "vinegar": { type: "Condiment", serving: "2 tablespoons" },
            "lemon juice": { type: "Condiment", serving: "2 tablespoons" },
            "garlic": { type: "Condiment", serving: "1 clove" }
        };

        window.onload = function() { checkAndResetDate(); };

        function checkAndResetDate() {
            const lastDate = localStorage.getItem('lastDate');
            const today = new Date().toDateString();
            if (lastDate !== today) { resetApp(false); localStorage.setItem('lastDate', today); }
        }

        function resetApp(manual = true) {
            if(manual && !confirm("Are you sure you want to reset the day?")) return;
            greens = 0; fats = 0; condiments = 0; fuelings = 0; water = 0;
            document.getElementById('fuelingCount').innerText = 0;
            document.getElementById('waterCount').innerText = "0 oz";
            document.getElementById('waterBar').style.width = "0%";
            document.getElementById('greenCount').innerText = 0;
            document.getElementById('fatCount').innerText = 0;
            document.getElementById('condCount').innerText = 0;
            document.getElementById('searchResult').classList.add('hidden');
            document.getElementById('searchInput').value = "";
        }

        function logFueling() {
            if(fuelings < 5) {
                fuelings++;
                document.getElementById('fuelingCount').innerText = fuelings;
            } else { alert("You have logged all 5 fuelings!"); }
        }

        function addWater() {
            water += 8;
            document.getElementById('waterCount').innerText = water + " oz";
            let percent = (water / 64) * 100;
            document.getElementById('waterBar').style.width = Math.min(percent, 100) + "%";
        }

        function searchFoodDatabase() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const resultDisplay = document.getElementById('searchResult');
            const resName = document.getElementById('resultName');
            const resCat = document.getElementById('resultCategory');
            const resInst = document.getElementById('resultInstructions');
            
            resultDisplay.classList.remove('hidden');
            
            if (optaviaDB[query]) {
                currentItem = optaviaDB[query];
                resName.innerText = query.toUpperCase();
                resCat.innerText = currentItem.type;
                resInst.innerText = `1 serving is ${currentItem.serving}.`;
            } else {
                resName.innerText = "Item not found in Optavia guide.";
                resCat.innerText = "";
                resInst.innerText = "Please check spelling (e.g., 'chicken breast').";
                currentItem = null;
            }
        }

        function logSearchResult() {
            if (!currentItem) return;
            if (currentItem.type === "Green Vegetable") {
                if(greens < 3) { greens++; document.getElementById('greenCount').innerText = greens; }
                else { alert("You have already logged 3 Greens!"); }
            } else if (currentItem.type === "Healthy Fat") {
                fats++; document.getElementById('fatCount').innerText = fats;
            } else if (currentItem.type === "Condiment") {
                condiments++; document.getElementById('condCount').innerText = condiments;
            } else if (currentItem.type === "Protein") {
                alert("Log protein by its specified raw weight.");
            }
            document.getElementById('searchResult').classList.add('hidden');
            document.getElementById('searchInput').value = "";
        }
    </script>
</body>
</html>
