<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optavia Precision Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .optavia-green { background-color: #2D5A27; }
        .card { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input:focus { border-color: #2D5A27; outline: none; ring: 2px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans pb-24">

    <nav class="optavia-green p-4 text-white text-center sticky top-0 z-50 shadow-md">
        <h1 class="text-xl font-bold tracking-tight">5&1 Precision Log</h1>
    </nav>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div class="card bg-white p-4">
            <h3 class="text-[10px] font-bold text-gray-400 uppercase mb-3">Daily Staples (One-Tap)</h3>
            <div class="flex gap-2 overflow-x-auto pb-2">
                <button onclick="quickAdd('olive oil')" class="bg-yellow-50 text-yellow-700 px-3 py-2 rounded-full text-xs font-bold border border-yellow-200 whitespace-nowrap">💧 Olive Oil</button>
                <button onclick="quickAdd('spinach')" class="bg-green-50 text-green-700 px-3 py-2 rounded-full text-xs font-bold border border-green-200 whitespace-nowrap">🍃 Spinach</button>
                <button onclick="quickAdd('mustard')" class="bg-blue-50 text-blue-700 px-3 py-2 rounded-full text-xs font-bold border border-blue-200 whitespace-nowrap">🍯 Mustard</button>
                <button onclick="quickAdd('bell pepper')" class="bg-red-50 text-red-700 px-3 py-2 rounded-full text-xs font-bold border border-red-200 whitespace-nowrap">🫑 Bell Pepper</button>
            </div>
        </div>

        <div class="card bg-white p-6 shadow-sm border-t-4 border-green-700">
            <div class="flex justify-between items-end mb-4">
                <div class="flex-1 mr-2">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">State</label>
                    <select id="foodState" class="w-full border p-2 rounded-lg bg-gray-50 text-xs">
                        <option value="raw">Raw / Fresh</option>
                        <option value="frozen">Cooked (Frozen)</option>
                        <option value="cooked_fresh">Cooked (Fresh)</option>
                    </select>
                </div>
                <div class="flex-[2]">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Search Food</label>
                    <input type="text" id="searchInput" oninput="instantSearch()" placeholder="Type to search..." class="w-full border p-2 rounded-lg text-sm bg-gray-50">
                </div>
            </div>

            <div id="searchResult" class="hidden animate-in fade-in duration-300">
                <div class="bg-green-50 p-4 rounded-xl border border-green-100">
                    <div class="flex justify-between items-center mb-3">
                        <span id="resultName" class="font-black text-lg text-gray-800 uppercase"></span>
                        <span id="resultCategory" class="text-[10px] font-bold px-2 py-1 rounded-md"></span>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="bg-white p-2 rounded border"><p class="text-[9px] text-gray-400 font-bold uppercase">Volume</p><p id="resVol" class="text-sm font-bold"></p></div>
                        <div class="bg-white p-2 rounded border"><p class="text-[9px] text-gray-400 font-bold uppercase">Weight</p><p id="resWeight" class="text-sm font-bold"></p></div>
                    </div>
                    <button onclick="logSearchResult()" class="w-full mt-4 bg-green-700 text-white p-3 rounded-lg font-bold shadow-lg active:scale-95 transition-transform">ADD SERVING</button>
                </div>
            </div>
        </div>

        <div class="card bg-gray-900 text-white p-6 shadow-xl">
            <div class="grid grid-cols-3 gap-4 text-center">
                <div><p class="text-green-400 text-[10px] font-bold uppercase mb-1">Greens</p><p id="greenCount" class="text-3xl font-black">0/3</p></div>
                <div class="border-x border-gray-700"><p class="text-yellow-400 text-[10px] font-bold uppercase mb-1">Fats</p><p id="fatCount" class="text-3xl font-black">0</p></div>
                <div><p class="text-blue-400 text-[10px] font-bold uppercase mb-1">Cond.</p><p id="condCount" class="text-3xl font-black">0/3</p></div>
            </div>
        </div>

    </div>

    <script>
        // DATA OBJECT (Local for speed)
        const db = {
            "bell pepper": { type: "Green", raw: {v:"1/2 cup", w:"2.63oz"}, frozen: {v:"1/2 cup", w:"2.40oz"}, cooked_fresh: {v:"1/2 cup", w:"2.40oz"} },
            "spinach": { type: "Green", raw: {v:"2 cups", w:"2.12oz"}, frozen: {v:"1/2 cup", w:"3.35oz"}, cooked_fresh: {v:"1/2 cup", w:"3.17oz"} },
            "broccoli": { type: "Green", raw: {v:"1 cup", w:"2.50oz"}, frozen: {v:"1/2 cup", w:"3.25oz"}, cooked_fresh: {v:"1/2 cup", w:"2.75oz"} },
            "mushrooms": { type: "Green", raw: {v:"1/2 cup", w:"1.23oz"}, frozen: {v:"1/2 cup", w:"2.75oz"}, cooked_fresh: {v:"1/2 cup", w:"2.75oz"} },
            "cabbage": { type: "Green", raw: {v:"1/2 cup", w:"1.23oz"}, frozen: {v:"1/2 cup", w:"2.65oz"}, cooked_fresh: {v:"1/2 cup", w:"2.65oz"} },
            "olive oil": { type: "Fat", any: {v:"1 tsp", w:"4.5g"} },
            "avocado": { type: "Fat", any: {v:"1/4 small", w:"1.5oz"} },
            "mustard": { type: "Condiment", any: {v:"1 Tbsp", w:"N/A"} },
            "cilantro": { type: "Condiment", any: {v:"1 Tbsp", w:"N/A"} }
        };

        let totals = { Green: 0, Fat: 0, Condiment: 0 };
        let currentItem = null;

        function instantSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const state = document.getElementById('foodState').value;
            const resBox = document.getElementById('searchResult');
            
            if (db[query]) {
                currentItem = db[query];
                const data = currentItem[state] || currentItem.any || currentItem.raw;
                document.getElementById('resultName').innerText = query;
                document.getElementById('resVol').innerText = data.v;
                document.getElementById('resWeight').innerText = data.w;
                
                const catEl = document.getElementById('resultCategory');
                catEl.innerText = currentItem.type;
                catEl.className = currentItem.type === "Green" ? "bg-green-200 text-green-800" : "bg-blue-200 text-blue-800";
                
                resBox.classList.remove('hidden');
            } else {
                resBox.classList.add('hidden');
            }
        }

        function quickAdd(name) {
            document.getElementById('searchInput').value = name;
            instantSearch();
            logSearchResult();
        }

        function logSearchResult() {
            if (!currentItem) return;
            totals[currentItem.type]++;
            updateUI();
            document.getElementById('searchResult').classList.add('hidden');
            document.getElementById('searchInput').value = "";
        }

        function updateUI() {
            document.getElementById('greenCount').innerText = `${totals.Green}/3`;
            document.getElementById('fatCount').innerText = totals.Fat;
            document.getElementById('condCount').innerText = `${totals.Condiment}/3`;
        }

        function resetApp() { if(confirm("Reset totals?")) { totals={Green:0, Fat:0, Condiment:0}; updateUI(); } }
    </script>
</body>
</html>
