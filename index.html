<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optavia Precision Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .optavia-green { background-color: #2D5A27; }
        .card { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        /* Make sure the search button is impossible to miss */
        .search-btn { background-color: #2563eb !important; transition: all 0.2s; }
        .search-btn:active { transform: scale(0.95); background-color: #1d4ed8 !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans pb-24">

    <nav class="optavia-green p-4 text-white text-center sticky top-0 z-50 shadow-md">
        <h1 class="text-xl font-bold tracking-tight">5&1 Precision Log</h1>
    </nav>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div class="card bg-gray-900 text-white p-5 shadow-xl">
            <div class="grid grid-cols-3 gap-2 text-center">
                <div><p class="text-green-400 text-[9px] font-bold uppercase">Greens</p><p id="greenCount" class="text-2xl font-black">0/3</p></div>
                <div class="border-x border-gray-700"><p class="text-yellow-400 text-[9px] font-bold uppercase">Fats</p><p id="fatCount" class="text-2xl font-black">0</p></div>
                <div><p class="text-blue-400 text-[9px] font-bold uppercase">Cond.</p><p id="condCount" class="text-2xl font-black">0/3</p></div>
            </div>
        </div>

        <div class="card bg-white p-6 shadow-sm border-t-4 border-blue-600">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">1. Preparation State</label>
                    <select id="foodState" class="w-full border-2 border-gray-200 p-3 rounded-lg bg-gray-50 text-sm focus:border-blue-500 outline-none">
                        <option value="raw">Raw / Fresh</option>
                        <option value="frozen">Cooked (from Frozen)</option>
                        <option value="cooked_fresh">Cooked (from Fresh)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">2. Food Name</label>
                    <input type="text" id="searchInput" placeholder="Type here (e.g. Chicken, Broccoli)" class="w-full border-2 border-gray-200 p-4 rounded-lg text-lg bg-white focus:border-blue-500 outline-none mb-3">
                    
                    <button onclick="executeSearch()" class="w-full search-btn text-white py-4 rounded-xl font-black text-lg shadow-lg uppercase tracking-widest">
                        🔍 Click to Search
                    </button>
                </div>
            </div>

            <div id="history" class="mt-4 flex flex-wrap gap-2"></div>

            <div id="searchResult" class="hidden mt-6 animate-in slide-in-from-top duration-300">
                <div class="bg-blue-50 p-5 rounded-xl border-2 border-blue-200">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p id="resultName" class="font-black text-2xl text-gray-800 uppercase"></p>
                            <span id="resultCategory" class="text-xs font-bold px-3 py-1 rounded-full bg-white border-2 inline-block mt-2"></span>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div class="bg-white p-3 rounded-lg border shadow-sm text-center">
                            <p class="text-[10px] text-gray-400 font-bold uppercase">Volume Portions</p>
                            <p id="resVol" class="text-md font-bold text-gray-800"></p>
                        </div>
                        <div class="bg-white p-3 rounded-lg border shadow-sm text-center">
                            <p class="text-[10px] text-gray-400 font-bold uppercase">Weight Portions</p>
                            <p id="resWeight" class="text-md font-bold text-gray-800"></p>
                        </div>
                    </div>

                    <button onclick="logSearchResult()" class="w-full bg-green-600 text-white p-4 rounded-xl font-black text-lg shadow-md hover:bg-green-700 uppercase">
                        ✅ Add to Daily Log
                    </button>
                </div>
            </div>
        </div>

        <button onclick="resetApp()" class="w-full text-red-500 text-xs font-bold tracking-widest uppercase py-4 opacity-60">Reset All Data</button>
    </div>

    <script>
        const db = {
            // PROTEINS (Weights are typically cooked except where noted)
            "chicken breast": { type: "Protein", cooked_fresh: {v: "6 oz", w: "170g"}, raw: {v: "approx 8oz raw", w: "227g"}, note: "Leaner Protein." },
            "cod": { type: "Protein", raw: {v: "7 oz", w: "198g"}, note: "Leanest Protein." },
            "shrimp": { type: "Protein", raw: {v: "7 oz", w: "198g"}, note: "Leanest Protein." },
            "ground turkey 93%": { type: "Protein", cooked_fresh: {v: "6 oz", w: "170g"}, note: "Leaner Protein." },
            
            // GREENS
            "bell pepper": { type: "Green", raw: {v: "1/2 cup", w: "2.63 oz (75g)"}, frozen: {v: "1/2 cup", w: "2.40 oz (68g)"}, cooked_fresh: {v: "1/2 cup", w: "2.40 oz (68g)"} },
            "broccoli": { type: "Green", raw: {v: "1 cup", w: "2.50 oz (71g)"}, frozen: {v: "1/2 cup", w: "3.25 oz (92g)"}, cooked_fresh: {v: "1/2 cup", w: "2.75 oz (78g)"} },
            "spinach": { type: "Green", raw: {v: "2 cups", w: "2.12 oz (60g)"}, frozen: {v: "1/2 cup", w: "3.35 oz (95g)"}, cooked_fresh: {v: "1/2 cup", w: "3.17 oz (90g)"} },
            "cabbage": { type: "Green", raw: {v: "1/2 cup shredded", w: "1.23 oz (35g)"}, cooked_fresh: {v: "1/2 cup cooked", w: "2.65 oz (75g)"} },
            
            // FATS
            "olive oil": { type: "Fat", any: {v: "1 teaspoon", w: "4.5g"} },
            "avocado": { type: "Fat", any: {v: "1/4 small", w: "1.5 oz (42g)"} },
            
            // CONDIMENTS
            "cilantro": { type: "Condiment", any: {v: "1 Tablespoon fresh", w: "N/A"} },
            "mustard": { type: "Condiment", any: {v: "1 Tablespoon yellow", w: "N/A"} }
        };

        let totals = { Green: 0, Fat: 0, Condiment: 0 };
        let currentItem = null;
        let recentHistory = [];

        function executeSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const state = document.getElementById('foodState').value;
            const resBox = document.getElementById('searchResult');
            
            if (!query) return;

            const matchKey = Object.keys(db).find(key => key.includes(query) || query.includes(key));
            
            if (matchKey) {
                currentItem = db[matchKey];
                const data = currentItem[state] || currentItem.any || currentItem.raw;
                
                document.getElementById('resultName').innerText = matchKey;
                document.getElementById('resVol').innerText = data.v;
                document.getElementById('resWeight').innerText = data.w;
                
                const catEl = document.getElementById('resultCategory');
                catEl.innerText = currentItem.type.toUpperCase();
                
                // Set color based on type
                if(currentItem.type === 'Green') catEl.style.color = 'green';
                if(currentItem.type === 'Fat') catEl.style.color = '#b8860b';
                if(currentItem.type === 'Condiment') catEl.style.color = 'blue';
                if(currentItem.type === 'Protein') catEl.style.color = 'purple';

                resBox.classList.remove('hidden');
                addToHistory(matchKey);
            } else {
                alert("Food not found. Try 'Chicken', 'Olive Oil', or 'Broccoli'.");
            }
        }

        function addToHistory(item) {
            if (!recentHistory.includes(item)) {
                recentHistory.unshift(item);
                if (recentHistory.length > 4) recentHistory.pop();
                renderHistory();
            }
        }

        function renderHistory() {
            const hDiv = document.getElementById('history');
            hDiv.innerHTML = recentHistory.map(item => 
                `<button onclick="setSearch('${item}')" class="bg-gray-200 text-gray-700 px-3 py-1 rounded-full text-xs font-bold border border-gray-300">${item}</button>`
            ).join('');
        }

        function setSearch(val) {
            document.getElementById('searchInput').value = val;
            executeSearch();
        }

        function logSearchResult() {
            if (!currentItem) return;
            if (currentItem.type !== "Protein") {
                totals[currentItem.type]++;
                updateUI();
            } else {
                alert("Protein Serving Logged! (Remember: Lean/Leaner/Leanest weigh-ins apply)");
            }
            document.getElementById('searchResult').classList.add('hidden');
            document.getElementById('searchInput').value = "";
        }

        function updateUI() {
            document.getElementById('greenCount').innerText = `${totals.Green}/3`;
            document.getElementById('fatCount').innerText = totals.Fat;
            document.getElementById('condCount').innerText = `${totals.Condiment}/3`;
        }

        function resetApp() { if(confirm("Reset everything for today?")) { totals={Green:0, Fat:0, Condiment:0}; updateUI(); } }
    </script>
</body>
</html>
