<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optavia Precision Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .optavia-green { background-color: #2D5A27; }
        .card { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .search-btn { background-color: #2563eb !important; transition: all 0.2s; }
        .search-btn:active { transform: scale(0.95); background-color: #1d4ed8 !important; }
        .leanest-tag { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .leaner-tag { background-color: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
        .lean-tag { background-color: #ffedd5; color: #9a3412; border: 1px solid #fed7aa; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans pb-24">

    <nav class="optavia-green p-4 text-white text-center sticky top-0 z-50 shadow-md">
        <h1 class="text-xl font-bold tracking-tight">5&1 Precision Log</h1>
    </nav>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div class="card bg-gray-900 text-white p-5 shadow-xl">
            <div class="grid grid-cols-3 gap-2 text-center">
                <div><p class="text-green-400 text-[9px] font-bold uppercase">Greens</p><p id="greenCount" class="text-2xl font-black">0/3</p></div>
                <div class="border-x border-gray-700"><p class="text-yellow-400 text-[9px] font-bold uppercase">Fats</p><p id="fatCount" class="text-2xl font-black">0</p></div>
                <div><p class="text-blue-400 text-[9px] font-bold uppercase">Cond.</p><p id="condCount" class="text-2xl font-black">0/3</p></div>
            </div>
        </div>

        <div class="card bg-white p-6 shadow-sm border-t-4 border-blue-600">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">1. Preparation State</label>
                    <select id="foodState" class="w-full border-2 border-gray-200 p-3 rounded-lg bg-gray-50 text-sm outline-none">
                        <option value="cooked">Cooked Weight</option>
                        <option value="raw">Raw Weight</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">2. Food Name</label>
                    <input type="text" id="searchInput" placeholder="Type here (e.g. Chicken, Salmon, Beef)" class="w-full border-2 border-gray-200 p-4 rounded-lg text-lg bg-white outline-none mb-3">
                    <button onclick="executeSearch()" class="w-full search-btn text-white py-4 rounded-xl font-black text-lg shadow-lg uppercase tracking-widest">
                        🔍 Click to Search
                    </button>
                </div>
            </div>

            <div id="searchResult" class="hidden mt-6 animate-in slide-in-from-top duration-300">
                <div id="resultContainer" class="p-5 rounded-xl border-2">
                    <div class="mb-4">
                        <p id="resultName" class="font-black text-2xl text-gray-800 uppercase"></p>
                        <div id="proteinTag" class="mt-2 text-[10px] font-bold px-3 py-1 rounded-full inline-block"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div class="bg-white p-3 rounded-lg border shadow-sm text-center">
                            <p class="text-[10px] text-gray-400 font-bold uppercase">Portion Size</p>
                            <p id="resWeight" class="text-md font-bold text-gray-800"></p>
                        </div>
                        <div class="bg-white p-3 rounded-lg border shadow-sm text-center">
                            <p class="text-[10px] text-gray-400 font-bold uppercase">Add Healthy Fats</p>
                            <p id="resFats" class="text-md font-bold text-blue-700"></p>
                        </div>
                    </div>

                    <p id="resNote" class="text-[11px] text-gray-600 mb-4 italic leading-tight"></p>

                    <button onclick="logSearchResult()" class="w-full bg-green-600 text-white p-4 rounded-xl font-black text-lg shadow-md uppercase">
                        ✅ Add to Daily Log
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const db = {
            // PROTEINS
            "chicken breast": { type: "Protein", sub: "Leaner", fatReq: "1 Serving", cooked: {w: "6 oz"}, raw: {w: "approx 8 oz"}, note: "Skinless, boneless." },
            "chicken thigh": { type: "Protein", sub: "Lean", fatReq: "0 Servings", cooked: {w: "5 oz"}, raw: {w: "approx 7 oz"}, note: "Skinless." },
            "cod": { type: "Protein", sub: "Leanest", fatReq: "2 Servings", cooked: {w: "7 oz"}, raw: {w: "approx 9 oz"}, note: "White fish, very low fat." },
            "shrimp": { type: "Protein", sub: "Leanest", fatReq: "2 Servings", cooked: {w: "7 oz"}, raw: {w: "approx 9 oz"}, note: "Steamed or grilled." },
            "salmon": { type: "Protein", sub: "Lean", fatReq: "0 Servings", cooked: {w: "5 oz"}, raw: {w: "approx 7 oz"}, note: "High in natural healthy fats." },
            "ground turkey 93%": { type: "Protein", sub: "Leaner", fatReq: "1 Serving", cooked: {w: "6 oz"}, raw: {w: "approx 8 oz"} },
            "ground beef 85-94%": { type: "Protein", sub: "Lean", fatReq: "0 Servings", cooked: {w: "5 oz"}, raw: {w: "approx 7 oz"} },
            "egg whites": { type: "Protein", sub: "Leanest", fatReq: "2 Servings", cooked: {w: "2 cups (15 large)"}, note: "Liquid or fresh." },
            
            // GREENS/FATS/CONDIMENTS
            "bell pepper": { type: "Green", cooked: {w: "2.40 oz"}, raw: {w: "2.63 oz"}, note: "1 Green serving." },
            "olive oil": { type: "Fat", any: {w: "1 tsp (4.5g)"}, note: "1 Healthy Fat serving." },
            "cilantro": { type: "Condiment", any: {w: "1 Tbsp fresh"}, note: "1 Condiment serving." }
        };

        let totals = { Green: 0, Fat: 0, Condiment: 0 };
        let currentItem = null;

        function executeSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const state = document.getElementById('foodState').value;
            const resBox = document.getElementById('searchResult');
            const resCont = document.getElementById('resultContainer');
            
            if (!query) return;

            const matchKey = Object.keys(db).find(key => key.includes(query) || query.includes(key));
            
            if (matchKey) {
                currentItem = db[matchKey];
                const data = currentItem[state] || currentItem.any || currentItem.raw;
                
                document.getElementById('resultName').innerText = matchKey;
                document.getElementById('resWeight').innerText = data.w;
                document.getElementById('resNote').innerText = currentItem.note || "";
                
                const pTag = document.getElementById('proteinTag');
                const fatDisplay = document.getElementById('resFats');

                if (currentItem.type === "Protein") {
                    pTag.innerText = currentItem.sub + " Protein";
                    pTag.className = "mt-2 text-[10px] font-bold px-3 py-1 rounded-full inline-block " + 
                        (currentItem.sub === 'Leanest' ? 'leanest-tag' : currentItem.sub === 'Leaner' ? 'leaner-tag' : 'lean-tag');
                    fatDisplay.innerText = currentItem.fatReq;
                    resCont.className = "p-5 rounded-xl border-2 border-blue-200 bg-blue-50";
                } else {
                    pTag.innerText = currentItem.type;
                    pTag.className = "mt-2 text-[10px] font-bold px-3 py-1 rounded-full inline-block bg-white border";
                    fatDisplay.innerText = "N/A";
                    resCont.className = "p-5 rounded-xl border-2 border-green-200 bg-green-50";
                }

                resBox.classList.remove('hidden');
            } else {
                alert("Item not found. Try 'Chicken Breast' or 'Salmon'.");
            }
        }

        function logSearchResult() {
            if (!currentItem) return;
            if (currentItem.type !== "Protein") {
                totals[currentItem.type]++;
                updateUI();
            } else {
                alert(currentItem.sub + " protein logged. Remember to add " + currentItem.fatReq + " to your meal!");
            }
            document.getElementById('searchResult').classList.add('hidden');
            document.getElementById('searchInput').value = "";
        }

        function updateUI() {
            document.getElementById('greenCount').innerText = `${totals.Green}/3`;
            document.getElementById('fatCount').innerText = totals.Fat;
            document.getElementById('condCount').innerText = `${totals.Condiment}/3`;
        }

        function resetApp() { if(confirm("Reset totals?")) { totals={Green:0, Fat:0, Condiment:0}; updateUI(); } }
    </script>
</body>
</html>
